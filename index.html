    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when global fetch is read-only (like in some sandboxed environments)
      // and a library tries to polyfill or monkey-patch it.
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return originalFetch; },
              set: function() { console.warn('Blocked attempt to override window.fetch'); }
            });
          }
        } catch (e) {
          // If we can't redefine it, it might already be locked or we're in a very restricted environment
          console.debug('window.fetch safety patch skipped or failed', e);
        }
      })();
    </script>
